<!DOCTYPE html>
<html>
<head>

<title>Seating Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background: linear-gradient(135deg, #020617, #1e3a8a, #0f172a);
color:white;
text-align:center;
margin:0;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* Header */
.header{
background: linear-gradient(90deg, #020617, #1e3a8a);
padding:10px 25px 25px 25px;
box-shadow:0 4px 15px rgba(0,0,0,0.5);
}

.header h2{
  color:#ffffff;  
}

.header h3{
  color:#facc15;
}

.header h4{
  color:#86efac; 
}

.header p{
  color:#cbd5f5
}

.header h2{
margin-top:0;
}

.header p{
margin:0;
color:#94a3b8;
}

/* Card */
.card{
background: rgba(255,255,255,0.95);
color:black;
padding:20px;
border-radius:15px;
max-width:420px;
margin:40px auto;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* Input */
input{
padding:12px;
width:70%;
border-radius:8px;
border:1px solid #ccc;
text-transform:uppercase;
}

/* Button */
button{
padding:12px 20px;
background:#22c55e;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

/* Result */
.result{
text-align:left;
margin-top:20px;
}

.result p{
margin:6px 0;
}

.highlight{
background:#ecfdf5;
padding:10px;
border-radius:8px;
margin-top:10px;
}

/* Footer */
.footer{
margin-top:auto;
padding:10px;
font-size:14px;
color:#cbd5f5;
}

.header h1,
.header h3,
.header h4,
.header p {
    margin: 4px 0;
}

.main-content{
flex:1;
}

/* Error */
.error{
  color:#ef4444;
  font-weight:bold;
}

  
</style>

</head>

<body>

<div class="main-content">

<div class="header">
<h2>BITS EXAMINATION</h2>
<h3>CANDIDATE SEATING ARRANGEMENT</h3>
<h4>CENTRE : JAIN UNIVERSITY</h4>
<p>CHECK YOUR SEATING DETAILS USING YOUR BITS-ID(EX: 2024TH12...)</p>
<h4>Date: 04-05-2026 | SHIFT : FN</h4>
</div>

<div class="card">

<input id="idInput" placeholder="ENTER CANDIDATE ID" autofocus>
<button onclick="search()">Search</button>

<div id="result" class="result"></div>

</div>

</div> <!-- ✅ THIS IS THE IMPORTANT ADD -->

<div class="footer">
DEVELOPED BY DYNAMIC SUDARSAN
</div>

</body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>

let data = {};

fetch("students.xlsx")
.then(res => res.arrayBuffer())
.then(fileData => {

let workbook = XLSX.read(fileData);
let sheet = workbook.Sheets[workbook.SheetNames[0]];
let json = XLSX.utils.sheet_to_json(sheet);

json.forEach(row => {

data[row["Candidate ID"]] = {
    name: row["Candidate Name"],
    system: row["System Number"],
    lab: row["Lab"],
    floor: row["Floor"],
    block: row["Block"],
    program: row["Program Name"],
    subprogram: row["Sub Program"]
};

});

})
.catch(() => {
document.getElementById("result").innerHTML = "___❌ Error loading Excel file...!";
});

function search(){

if(Object.keys(data).length === 0){
document.getElementById("result").innerHTML="⏳ Loading data... Please wait 2–3 seconds and try again.";
return;
}

let id = document.getElementById("idInput").value.trim().toUpperCase();

let s = data[id];

if(!s){
document.getElementById("result").innerHTML =
`<p class="error">❌ Student not found! Please recheck your BITS ID and Enter.</p> 
<p>👉 If not found! Contact help desk : 4th Floor,A-WING,Lab 401.</P>`;
return;
}

document.getElementById("result").innerHTML = `

<h2>${s.name}</h2>

<p><b>System:</b> ${s.system}</p>
<p><b>Lab:</b> ${s.lab}</p>
<p><b>Floor:</b> ${s.floor}</p>
<p><b>Block:</b> ${s.block}</p>
<p><b>Program:</b> ${s.program}</p>
<p><b>Sub Program:</b> ${s.subprogram}</p>

<div class="highlight">
📍 Report to <b>${s.floor}</b> Floor, <b>${s.block}</b>, Lab <b>${s.lab}</b>, System <b>${s.system}</b>.
</div>

<p>✅MANDATORY :📱 Take a screenshot and show it to the invigilator!</p>

`;

}

document.getElementById("idInput").addEventListener("keydown", function(e){
if(e.key === "Enter"){
e.preventDefault();
search();
}
});

</script>

</body>
</html>
