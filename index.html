<!DOCTYPE html>
<html>
<head>
<title>Seating Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#020617,#1e3a8a,#0f172a);
color:white;
text-align:center;
margin:0;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* Header */

.header{
background:linear-gradient(90deg,#020617,#1e3a8a);
padding:10px 25px 25px;
box-shadow:0 4px 15px rgba(0,0,0,.5);
}

.header h2,
.header h3,
.header h4{
margin:4px 0;
}

.header h2{
color:#ffffff;
}

.header h3{
color:#facc15;
}

.header h4{
color:#86efac;
}

/* Main content */

.main-content{
flex:1;
}

/* Card */

.card{
background:rgba(255,255,255,.95);
color:black;
padding:20px;
border-radius:15px;
max-width:420px;
width:90%;
margin:40px auto;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

/* Input */

input{
padding:12px;
width:70%;
border-radius:8px;
border:1px solid #ccc;
text-transform:uppercase;
}

/* Button */

button{
padding:12px 20px;
background:#22c55e;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

/* Result */

.result{
text-align:left;
margin-top:20px;
}

.result p{
margin:6px 0;
}

.label{
color:#2563eb;
font-weight:600;
}

.value{
font-weight:bold;
color:black;
}

.highlight{
background:#ecfdf5;
padding:10px;
border-radius:8px;
margin-top:10px;
}

/* Error */

.error{
color:#ef4444;
font-weight:bold;
}

/* Footer */

.footer{
margin-top:auto;
padding:10px;
font-size:13px;
color:#cbd5f5;
}

</style>
</head>

<body>

<div class="main-content">

<div class="header">
<h2>BITS EXAMINATION</h2>
<h3>CANDIDATE SEATING ARRANGEMENT</h3>
<h4>CENTRE : JAIN UNIVERSITY</h4>
<h4>Date: 23-05-2026 | SHIFT : FN (9:00 AM)</h4>
</div>

<div class="card">

<input
id="idInput"
placeholder="ENTER FULL BITS ID(Ex:202318BT..)"
autofocus>

<button onclick="search()">Search</button>

<div id="result" class="result"></div>

</div>
</div>

<div class="footer">
DEVELOPED BY SUDARSAN NB
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>

let data={};

fetch("seating1.xlsx")
.then(res=>res.arrayBuffer())
.then(fileData=>{

let workbook=XLSX.read(fileData);

let sheet=
workbook.Sheets[
workbook.SheetNames[0]
];

let json=
XLSX.utils.sheet_to_json(sheet);

json.forEach(row=>{

if(!row["Candidate ID"]) return;

let id=row["Candidate ID"]
.toString()
.trim()
.toUpperCase();

data[id]={

name:row["Candidate Name"],
system:row["System Number"],
floor:row["Floor"],
block:row["Block"],
lab:row["Lab"],
program:row["Program Name"]

};

});

})

.catch(()=>{

document.getElementById("result").innerHTML=
`<p class="error">❌ Error loading Excel file!</p>`;

});

function search(){

if(Object.keys(data).length===0){

document.getElementById("result").innerHTML=
"⏳ Loading data... Please wait 2–3 seconds and try again.";

return;

}

let id=document
.getElementById("idInput")
.value
.trim()
.toUpperCase();

let s=data[id];

if(!s){

document.getElementById("result").innerHTML=`

<p class="error">
❌ Student not found! Please recheck your BITS ID.
</p>

<p>
✖️If details not found!👉 Contact Help Desk:
4th Floor, A-WING, Lab 401
</p>

`;

return;

}

document.getElementById("result").innerHTML=`

<h2>${s.name}</h2>

<p><span class="label">System No:</span> <span class="value">${s.system}</span></p>

<p><span class="label">Floor:</span> <span class="value">${s.floor}</span></p>

<p><span class="label">Block:</span> <span class="value">${s.block}</span></p>

<p><span class="label">Lab:</span> <span class="value">${s.lab}</span></p>

<p><span class="label">Program:</span> <span class="value">${s.program}</span></p>

<div class="highlight">

📍 Report to
<b>${s.floor}</b> Floor,
<b>${s.block}</b>,
Lab <b>${s.lab}</b>,
System <b>${s.system}</b>

</div>

<p>
✅ MANDATORY: 📱 Take a screenshot and show it to the invigilator.
</p>

`;

}

document
.getElementById("idInput")
.addEventListener("keydown",function(e){

if(e.key==="Enter"){

e.preventDefault();

search();

}

});

</script>

</body>
</html>
